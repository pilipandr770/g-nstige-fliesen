{% extends "admin/base_admin.html" %}

{% block title %}Foto bearbeiten{% endblock %}
{% block page_title %}Foto bearbeiten{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card admin-card p-4">
            <div class="mb-4">
                <img src="{{ photo.display_url }}"
                     alt="{{ photo.title or '' }}"
                     class="img-fluid rounded"
                     style="max-height: 300px; width: 100%; object-fit: cover;">
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Titel</label>
                    <input type="text" class="form-control" name="title"
                           value="{{ photo.title or '' }}"
                           placeholder="Titel (optional)">
                </div>
                <div class="mb-4">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="active" id="activeSwitch"
                               {% if photo.active %}checked{% endif %}>
                        <label class="form-check-label" for="activeSwitch">Auf der Website anzeigen (aktiv)</label>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-accent">
                        <i class="bi bi-check-lg me-1"></i>Speichern
                    </button>
                    <a href="{{ url_for('admin.manage_tile_photos') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Zurück
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
