{% extends "base.html" %}

{% block title %}Zahlung abgebrochen – Fliesen Showroom Frankfurt{% endblock %}

{% block content %}
<section class="py-5 mt-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <!-- Cancel Icon -->
                <div class="mb-4">
                    <div style="width: 90px; height: 90px; border-radius: 50%; background: #f8f9fa; display: inline-flex; align-items: center; justify-content: center;">
                        <i class="bi bi-x-lg text-muted" style="font-size: 2.8rem;"></i>
                    </div>
                </div>

                <h1 class="fw-bold mb-3">Zahlung abgebrochen</h1>
                <p class="text-muted mb-5 fs-5">
                    Der Bezahlvorgang wurde abgebrochen.<br>
                    Es wurde nichts von Ihrem Konto abgebucht.
                </p>

                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a href="{{ url_for('public.shop') }}" class="btn btn-accent px-4">
                        <i class="bi bi-arrow-left me-2"></i>Zurück zum Shop
                    </a>
                    <a href="{{ url_for('public.kontakt') }}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-question-circle me-2"></i>Hilfe &amp; Kontakt
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
